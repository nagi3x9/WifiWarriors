<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WifiWarriors - Status</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="crt-overlay"></div>
    <div class="container">
        <header>
            <h1 class="glitch" data-text="WifiWarriors">WifiWarriors</h1>
            <p class="subtitle">>>> CONNECTION ESTABLISHED <<<</p>
        </header>

        <main class="status-panel">
            <div class="panel-header">
                <h2>PLAYER STATUS</h2>
                <div class="scanline"></div>
            </div>
            
            <div class="status-grid" id="status-grid">
                <!-- Status items will be injected here by JS -->
                <div class="loading">Analyzing Network...</div>
            </div>

            <div class="raw-data" id="raw-data">
                <!-- Raw navigator.connection data -->
            </div>
            
            <button id="refresh-btn" class="cyber-btn">RE-SCAN CONNECTION</button>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
